<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taschengeld</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
  .app{max-width:480px;margin:0 auto;padding:1rem 1rem 4rem}
  h2{font-size:20px;font-weight:600;margin-bottom:1.25rem}
  input{width:100%;padding:10px 12px;border:1px solid #d1d1d6;border-radius:10px;font-size:15px;background:#fff;outline:none}
  input:focus{border-color:#007aff}
  label{display:block;font-size:13px;color:#6e6e73;margin-bottom:5px}
  .btn{width:100%;padding:11px;border-radius:10px;border:1px solid #d1d1d6;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#1d1d1f}
  .btn:active{opacity:0.7}
  .btn-ghost{background:transparent;border:none;cursor:pointer;color:#6e6e73;font-size:13px;padding:4px 8px}
  .card{background:#fff;border-radius:14px;border:1px solid #e5e5ea;overflow:hidden;margin-bottom:12px}
  .card-header{padding:16px 18px 12px;display:flex;align-items:center;gap:12px}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0}
  .section{padding:12px 18px;border-top:1px solid #f0f0f5}
  .row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f5}
  .row:last-child{border-bottom:none}
  .tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;flex-shrink:0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .stat-box{background:#f5f5f7;border-radius:10px;padding:10px 12px}
  .stat-label{font-size:11px;color:#6e6e73;margin-bottom:3px}
  .stat-val{font-size:16px;font-weight:600}
  .bar-wrap{height:6px;border-radius:3px;background:#e5e5ea;overflow:hidden;margin:6px 0}
  .bar{height:100%;border-radius:3px;transition:width .3s}
  .month-nav{display:flex;align-items:center;gap:4px}
  .month-nav button{background:none;border:none;cursor:pointer;font-size:20px;color:#6e6e73;padding:2px 6px;line-height:1}
  .month-nav button:disabled{color:#d1d1d6;cursor:default}
  .month-nav span{font-size:15px;font-weight:500;min-width:110px;text-align:center}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:100}
  .modal{width:100%;max-width:480px;background:#fff;border-radius:18px 18px 0 0;padding:1.5rem 1.25rem 2rem}
  .modal-title{font-size:17px;font-weight:600;margin-bottom:1rem}
  .pin-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200}
  .pin-modal{width:280px;background:#fff;border-radius:18px;padding:1.5rem}
  .status{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:#f5f5f7;margin-bottom:12px;font-size:12px;color:#6e6e73}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .carry-box{background:#fef9e7;border-radius:8px;padding:8px 12px;font-size:12px;color:#7d6608;margin-bottom:10px;display:flex;justify-content:space-between}
  .overshoot{background:#fef9e7;border-radius:8px;padding:8px 12px;font-size:12px;color:#833b0a;margin-top:6px}
  .loading{max-width:480px;margin:4rem auto;text-align:center;color:#6e6e73;font-size:14px;padding:2rem}
  .flex{display:flex;gap:8px}
  .flex .btn{flex:1}
  .field{margin-bottom:14px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Firebase config ────────────────────────────────────────────────────────
const FB = "https://taschengeld-b3e94-default-rtdb.europe-west1.firebasedatabase.app";

const fbLoad = async () => {
  const r = await fetch(`${FB}/taschengeld.json`);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  return d || {children:[]};
};
const fbSave = async data => {
  const r = await fetch(`${FB}/taschengeld.json`, {
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
};

// ── Constants ──────────────────────────────────────────────────────────────
const MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const COLS = [
  {bg:"#e6f1fb",text:"#042c53",bar:"#378add"},
  {bg:"#e1f5ee",text:"#04342c",bar:"#1d9e75"},
  {bg:"#fbeaf0",text:"#4b1528",bar:"#d4537e"},
  {bg:"#faeeda",text:"#412402",bar:"#ba7517"},
  {bg:"#eeedfe",text:"#26215c",bar:"#7f77dd"},
  {bg:"#faece7",text:"#4a1b0c",bar:"#d85a30"},
];
const fmt = v => new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(v??0);
const fmtD = iso => new Date(iso).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"});
const todayKey = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };
const mLabel = k => { const [y,m]=k.split("-"); return `${MONTHS[+m-1]} ${y}`; };
const inits = n => n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const stepM = (mk,d) => { const [y,m]=mk.split("-").map(Number); const dt=new Date(y,m-1+d,1); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}`; };

// ── State ──────────────────────────────────────────────────────────────────
let S = {
  data: {children:[]},
  loading: true,
  saving: false,
  saveErr: false,
  mode: "kind",
  view: "home",
  selId: null,
  month: todayKey(),
  modal: null,
  form: {betrag:"",notiz:"",typ:"taschengeld",datum:""},
  kindForm: {betrag:"",notiz:"",typ:"ausgabe",datum:""},
  kindModal: null,
  szForm: {name:"",ziel:""},
  newChild: {name:"",monatlBetrag:""},
  editMonatl: "",
  activeKindId: null,
  kindPinOk: false,
  kindPin: "",
  kindPinError: false,
  kindSettingPin: false,
  pin: "",
  savedPin: localStorage.getItem("tg-pin")||"",
  pinError: false,
  settingPin: false,
};

// ── Logic ──────────────────────────────────────────────────────────────────
const getCarryOver = (c, beforeMk) => {
  const keys=[...new Set((c.transaktionen||[]).map(t=>t.monatKey))].filter(k=>k<beforeMk).sort();
  return keys.reduce((debt,mk)=>{
    const txs=(c.transaktionen||[]).filter(t=>t.monatKey===mk);
    const el=txs.filter(t=>t.typ==="taschengeld"||t.typ==="auslage").reduce((s,t)=>s+t.betrag,0);
    return debt+el-(c.monatlBetrag||0);
  },0);
};
const calcStats = (c,mk) => {
  const txs=(c.transaktionen||[]).filter(t=>t.monatKey===mk);
  const ausgezahlt=txs.filter(t=>t.typ==="taschengeld").reduce((s,t)=>s+t.betrag,0);
  const auslagen=txs.filter(t=>t.typ==="auslage").reduce((s,t)=>s+t.betrag,0);
  const ausgaben=txs.filter(t=>t.typ==="ausgabe").reduce((s,t)=>s+t.betrag,0);
  const elternGesamt=ausgezahlt+auslagen;
  const vereinbart=c.monatlBetrag||0;
  const carryOver=getCarryOver(c,mk);
  const netOffen=vereinbart-carryOver-elternGesamt;
  return {ausgezahlt,auslagen,ausgaben,elternGesamt,vereinbart,carryOver,netOffen,offen:Math.max(0,netOffen),verfuegbar:Math.max(0,ausgezahlt-ausgaben),txs};
};

const saveData = async next => {
  S.data=next; S.saving=true; S.saveErr=false; render();
  try { await fbSave(next); S.saving=false; }
  catch { S.saving=false; S.saveErr=true; }
  render();
};

const navigate = (url, mode, extras={}) => {
  history.pushState({}, '', url);
  S.mode = mode;
  Object.assign(S, extras);
  if(mode==='kind') S.kindPinOk=false;
  render();
};
const initRoute = () => {
  const p = new URLSearchParams(window.location.search);
  if(p.get('kind')){ S.activeKindId=p.get('kind'); S.mode='kind'; }
  else { S.settingPin=!S.savedPin; S.mode='pin'; }
};

// ── DOM helpers ────────────────────────────────────────────────────────────
const h = (tag,attrs={},children=[]) => {
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k==="className") el.className=v;
    else if(k==="disabled") { if(v) el.disabled=true; }
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c==null||c===false) return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return el;
};
const on = (el,ev,fn) => { el.addEventListener(ev,fn); return el; };

const monthNav = (large=false) => {
  const wrap=h("div",{className:"month-nav"});
  const btnL=on(h("button",{},["‹"]),"click",()=>{S.month=stepM(S.month,-1);render();});
  const lbl=h("span",{style:{fontSize:large?"18px":"14px",fontWeight:large?"600":"400"}},[mLabel(S.month)]);
  const btnR=on(h("button",{disabled:S.month===todayKey()},["›"]),"click",()=>{if(S.month!==todayKey()){S.month=stepM(S.month,1);render();}});
  wrap.append(btnL,lbl,btnR);
  return wrap;
};

const statusBar = () => {
  const dot=h("div",{className:"dot",style:{background:S.saving?"#ba7517":S.saveErr?"#c0392b":"#1d9e75"}});
  const txt=S.saving?"Wird gespeichert…":S.saveErr?"Speichern fehlgeschlagen":"Gespeichert in Firebase";
  return h("div",{className:"status"},[dot,txt]);
};

const buildModal = (title,onClose) => {
  const bg=h("div",{className:"modal-bg"});
  const box=h("div",{className:"modal"});
  box.append(h("div",{className:"modal-title"},[title]));
  on(bg,"click",e=>{if(e.target===bg)onClose();});
  bg.append(box); bg._box=box;
  return bg;
};
const addField = (modal,label,type,placeholder,sKey,pKey) => {
  const inp=h("input",{type,placeholder});
  inp.value = pKey ? S[sKey][pKey] : S[sKey];
  on(inp,"input",e=>{ if(pKey) S[sKey][pKey]=e.target.value; else S[sKey]=e.target.value; });
  modal._box.append(h("div",{className:"field"},[h("label",{},[label]),inp]));
  return inp;
};
const addModalBtns = (modal,onCancel,onSave,label="Speichern") => {
  const row=h("div",{className:"flex",style:{marginTop:"4px"}});
  row.append(
    on(h("button",{className:"btn",style:{color:"#6e6e73"}},["Abbrechen"]),"click",onCancel),
    on(h("button",{className:"btn",style:{fontWeight:"600"}},[label]),"click",onSave)
  );
  modal._box.append(row);
};

// ── PIN overlay ────────────────────────────────────────────────────────────
const renderPin = () => {
  const bg=h("div",{className:"pin-modal-bg"});
  const box=h("div",{className:"pin-modal"});
  box.append(h("p",{style:{fontSize:"16px",fontWeight:"600",marginBottom:"6px"}},[S.settingPin?"PIN festlegen":"Eltern-Zugang"]));
  box.append(h("p",{style:{fontSize:"13px",color:"#6e6e73",marginBottom:"1rem"}},[S.settingPin?"Wähle eine PIN (mind. 4 Stellen).":"Bitte PIN eingeben."]));
  const inp=h("input",{type:"password",placeholder:"••••",style:{textAlign:"center",fontSize:"20px",letterSpacing:"4px",marginBottom:S.pinError?"8px":"16px"}});
  inp.value=S.pin;
  const doPin = () => {
    if(!S.savedPin){
      if(S.pin.length<4){S.pinError=true;render();return;}
      localStorage.setItem("tg-pin",S.pin);
      S.savedPin=S.pin; S.pin=""; S.settingPin=false; S.mode="eltern"; render();
    } else {
      if(S.pin===S.savedPin){S.pin="";S.pinError=false;S.mode="eltern";render();}
      else{S.pinError=true;S.pin="";render();}
    }
  };
  on(inp,"input",e=>{S.pin=e.target.value;S.pinError=false;});
  on(inp,"keydown",e=>{if(e.key==="Enter")doPin();});
  box.append(inp);
  if(S.pinError) box.append(h("p",{style:{fontSize:"12px",color:"#c0392b",marginBottom:"12px"}},[S.savedPin?"Falsche PIN.":"Mindestens 4 Stellen."]));
  const row=h("div",{className:"flex"});
  row.append(on(h("button",{className:"btn",style:{fontWeight:"600"}},["OK"]),"click",doPin));
  box.append(row);
  if(S.savedPin){
    box.append(on(h("button",{className:"btn-ghost",style:{width:"100%",textAlign:"center",marginTop:"12px",textDecoration:"underline"}},["PIN vergessen – neu festlegen"]),"click",()=>{
      localStorage.removeItem("tg-pin"); S.savedPin=""; S.pin=""; S.pinError=false; S.settingPin=true; render();
    }));
  }
  bg.append(box);
  return bg;
};

// ── Kind PIN overlay ───────────────────────────────────────────────────────
const renderKindPin = () => {
  const id=S.activeKindId;
  const saved=localStorage.getItem("tg-kid-pin-"+id)||"";
  const setting=S.kindSettingPin||!saved;
  const child=(S.data.children||[]).find(c=>c.id===id);
  const name=child?child.name:"";
  const bg=h("div",{className:"pin-modal-bg"});
  const box=h("div",{className:"pin-modal"});
  box.append(
    h("p",{style:{fontSize:"16px",fontWeight:"600",marginBottom:"6px"}},[setting?"PIN festlegen":"Hallo"+(name?", "+name:"")+"!"]),
    h("p",{style:{fontSize:"13px",color:"#6e6e73",marginBottom:"1rem"}},[setting?"Wähle eine PIN (mind. 4 Stellen).":"Bitte PIN eingeben."])
  );
  const inp=h("input",{type:"password",placeholder:"••••",style:{textAlign:"center",fontSize:"20px",letterSpacing:"4px",marginBottom:S.kindPinError?"8px":"16px"}});
  inp.value=S.kindPin;
  const doPin=()=>{
    if(setting){
      if(S.kindPin.length<4){S.kindPinError=true;render();return;}
      localStorage.setItem("tg-kid-pin-"+id,S.kindPin);
      S.kindPin="";S.kindPinError=false;S.kindSettingPin=false;S.kindPinOk=true;render();
    } else {
      if(S.kindPin===saved){S.kindPin="";S.kindPinError=false;S.kindPinOk=true;render();}
      else{S.kindPinError=true;S.kindPin="";render();}
    }
  };
  on(inp,"input",e=>{S.kindPin=e.target.value;S.kindPinError=false;});
  on(inp,"keydown",e=>{if(e.key==="Enter")doPin();});
  box.append(inp);
  if(S.kindPinError) box.append(h("p",{style:{fontSize:"12px",color:"#c0392b",marginBottom:"12px"}},[setting?"Mindestens 4 Stellen.":"Falsche PIN."]));
  const row=h("div",{className:"flex"});
  row.append(
    on(h("button",{className:"btn",style:{color:"#6e6e73"}},["Abbrechen"]),"click",()=>{S.kindPin="";S.kindPinError=false;S.kindSettingPin=false;S.pin="";S.pinError=false;S.settingPin=false;navigate("/","pin",{activeKindId:null});}),
    on(h("button",{className:"btn",style:{fontWeight:"600"}},["OK"]),"click",doPin)
  );
  box.append(row);
  if(saved&&!setting){
    box.append(on(h("button",{className:"btn-ghost",style:{width:"100%",textAlign:"center",marginTop:"12px",textDecoration:"underline"}},["PIN vergessen – neu festlegen"]),"click",()=>{
      localStorage.removeItem("tg-kid-pin-"+id);
      S.kindPin="";S.kindPinError=false;S.kindSettingPin=false;render();
    }));
  }
  bg.append(box);
  return bg;
};

// ── Kind view ──────────────────────────────────────────────────────────────
const renderKind = () => {
  const wrap=h("div",{className:"app"});
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}});
  hdr.append(h("h2",{style:{margin:0}},["Taschengeld"]),monthNav());
  wrap.append(hdr,statusBar());

  const _allCh=S.data.children||[];
  const _kindCh=S.activeKindId?_allCh.filter(c=>c.id===S.activeKindId):_allCh;
  if(S.activeKindId&&!_kindCh.length){
    wrap.append(h("p",{style:{textAlign:"center",color:"#6e6e73",marginTop:"2rem"}},["Kind nicht gefunden."]));
    wrap.append(on(h("button",{className:"btn",style:{marginTop:"1rem"}},["Zur Startseite"]),"click",()=>{S.pin="";S.pinError=false;S.settingPin=false;navigate("/","pin",{activeKindId:null});}));
    return wrap;
  }
  _kindCh.forEach((c)=>{
    const i=_allCh.findIndex(x=>x.id===c.id);
    const col=COLS[i%COLS.length], s=calcStats(c,S.month);
    const pct=s.vereinbart>0?Math.min(100,((s.elternGesamt+s.carryOver)/s.vereinbart)*100):0;
    const card=h("div",{className:"card"});

    // Header
    card.append(h("div",{className:"card-header"},[
      h("div",{className:"avatar",style:{background:col.bg,color:col.text}},[inits(c.name)]),
      h("div",{},[h("p",{style:{fontWeight:"600",fontSize:"16px",color:col.text}},[c.name]),h("p",{style:{fontSize:"12px",color:col.text,opacity:"0.7"}},[`${fmt(s.vereinbart)} / Monat`])])
    ]));

    // Guthaben
    const sec1=h("div",{className:"section"});
    const g=h("div",{className:"grid2"});
    g.append(
      h("div",{className:"stat-box"},[h("div",{className:"stat-label"},["Noch zu bekommen"]),h("div",{className:"stat-val",style:{color:s.netOffen>0?col.text:"#aaa"}},[s.netOffen>0?fmt(s.offen):"–"])]),
      h("div",{className:"stat-box"},[h("div",{className:"stat-label"},["Verfügbares Bargeld"]),h("div",{className:"stat-val",style:{color:s.verfuegbar>0?"#1d9e75":"#aaa"}},[fmt(s.verfuegbar)])])
    );
    sec1.append(g);
    if(s.netOffen<0) sec1.append(h("div",{className:"overshoot"},[`${fmt(-s.netOffen)} werden vom nächsten Monat abgezogen`]));
    card.append(sec1);

    // Fortschritt
    const sec2=h("div",{className:"section"});
    sec2.append(h("div",{style:{fontSize:"11px",color:"#6e6e73",marginBottom:"6px"}},["Taschengeld verrechnet"]));
    sec2.append(h("div",{className:"bar-wrap"},[h("div",{className:"bar",style:{width:pct+"%",background:s.netOffen<0?"#ef9f27":col.bar}})]));
    const inf=h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#6e6e73"}});
    inf.append(h("span",{},["Bargeld "+fmt(s.ausgezahlt)]),h("span",{},["Auslagen "+fmt(s.auslagen)]));
    if(s.carryOver>0) inf.append(h("span",{style:{color:"#833b0a"}},["Übertrag −"+fmt(s.carryOver)]));
    sec2.append(inf);
    card.append(sec2);

    // Ausgaben
    const sec3=h("div",{className:"section"});
    const ar=h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"8px"}});
    ar.append(h("span",{style:{fontSize:"11px",color:"#6e6e73"}},["Meine Ausgaben"]),h("span",{style:{fontWeight:"600",color:"#d4537e"}},[fmt(s.ausgaben)]));
    sec3.append(ar);
    s.txs.filter(t=>t.typ==="ausgabe").forEach(tx=>{
      sec3.append(h("div",{className:"row"},[h("span",{style:{fontSize:"13px"}},[tx.notiz||"Ausgabe"]),h("span",{style:{fontSize:"13px",fontWeight:"500",color:"#d4537e"}},["−"+fmt(tx.betrag)])]));
    });
    sec3.append(on(h("button",{className:"btn",style:{marginTop:"10px",fontSize:"13px"}},["+ Ausgabe eintragen"]),"click",()=>{
      S.selId=c.id; S.kindForm={betrag:"",notiz:"",typ:"ausgabe",datum:""}; S.kindModal="ausgabe"; render();
    }));
    card.append(sec3);

    // Sparziele
    const sec4=h("div",{className:"section"});
    sec4.append(h("div",{style:{fontSize:"11px",color:"#6e6e73",marginBottom:"10px"}},["Sparziele"]));
    if(!(c.sparziele||[]).length) sec4.append(h("p",{style:{fontSize:"13px",color:"#6e6e73",marginBottom:"10px"}},["Noch kein Sparziel."]));
    (c.sparziele||[]).forEach(sz=>{
      const spPct=sz.ziel>0?Math.min(100,(sz.gespart/sz.ziel)*100):0;
      const szW=h("div",{style:{marginBottom:"12px"}});
      const szH=h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"4px"}});
      szH.append(h("span",{style:{fontWeight:"600"}},[sz.name]),h("span",{style:{color:"#6e6e73"}},[fmt(sz.gespart)+" / "+fmt(sz.ziel)]));
      szW.append(szH,h("div",{className:"bar-wrap"},[h("div",{className:"bar",style:{width:spPct+"%",background:col.bar}})]));
      if(sz.gespart>=sz.ziel){
        szW.append(h("p",{style:{fontSize:"12px",color:col.text,fontWeight:"600"}},["🎉 Ziel erreicht!"]));
      } else {
        const br=h("div",{style:{display:"flex",gap:"6px",marginTop:"4px"}});
        [1,2,5].forEach(b=>{
          br.append(on(h("button",{className:"btn",style:{flex:"1",padding:"5px",fontSize:"12px"}},["+" +fmt(b)]),"click",()=>{
            saveData({...S.data,children:S.data.children.map(ch=>{
              if(ch.id!==c.id) return ch;
              return {...ch,sparziele:(ch.sparziele||[]).map(s2=>s2.id===sz.id?{...s2,gespart:Math.min(s2.ziel,s2.gespart+b)}:s2)};
            })});
          }));
        });
        szW.append(br);
      }
      sec4.append(szW);
    });
    sec4.append(on(h("button",{className:"btn",style:{fontSize:"13px"}},["+ Sparziel hinzufügen"]),"click",()=>{
      S.selId=c.id; S.szForm={name:"",ziel:""}; S.kindModal="sparziel"; render();
    }));
    card.append(sec4);
    wrap.append(card);
  });

  wrap.append(h("div",{style:{display:"flex",justifyContent:"center",gap:"20px",marginTop:"1.5rem"}},[
    on(h("button",{className:"btn-ghost",style:{fontSize:"13px",color:"#6e6e73"}},["Abmelden"]),"click",()=>{S.kindPinOk=false;S.kindPin="";S.kindPinError=false;render();}),
    on(h("button",{className:"btn-ghost",style:{fontSize:"13px",color:"#6e6e73"}},["PIN ändern"]),"click",()=>{
      localStorage.removeItem("tg-kid-pin-"+S.activeKindId);
      S.kindPin="";S.kindPinError=false;S.kindSettingPin=false;S.kindPinOk=false;render();
    })
  ]));

  if(S.kindModal==="ausgabe"){
    const m=buildModal("Ausgabe eintragen",()=>{S.kindModal=null;render();});
    addField(m,"Betrag (€)","text","0,00","kindForm","betrag");
    addField(m,"Wofür?","text","z. B. Kino, Eis …","kindForm","notiz");
    addField(m,"Datum","date","","kindForm","datum");
    addModalBtns(m,()=>{S.kindModal=null;render();},()=>{
      const betrag=parseFloat(S.kindForm.betrag.replace(",","."));
      if(!betrag||betrag<=0) return;
      const txDatum=S.kindForm.datum?new Date(S.kindForm.datum).toISOString():new Date().toISOString();
      const tx={id:Date.now().toString(),typ:"ausgabe",betrag,notiz:S.kindForm.notiz.trim(),datum:txDatum,monatKey:S.kindForm.datum?S.kindForm.datum.slice(0,7):S.month};
      S.kindModal=null;
      saveData({...S.data,children:S.data.children.map(c=>c.id===S.selId?{...c,transaktionen:[tx,...(c.transaktionen||[])]}:c)});
    });
    wrap.append(m);
  }
  if(S.kindModal==="sparziel"){
    const m=buildModal("Sparziel hinzufügen",()=>{S.kindModal=null;render();});
    addField(m,"Wofür sparst du?","text","z. B. Fahrrad …","szForm","name");
    addField(m,"Zielbetrag (€)","text","z. B. 50,00","szForm","ziel");
    addModalBtns(m,()=>{S.kindModal=null;render();},()=>{
      if(!S.szForm.name.trim()) return;
      const sz={id:Date.now().toString(),name:S.szForm.name.trim(),ziel:parseFloat(S.szForm.ziel.replace(",","."))||0,gespart:0};
      S.kindModal=null;
      saveData({...S.data,children:S.data.children.map(c=>c.id===S.selId?{...c,sparziele:[...(c.sparziele||[]),sz]}:c)});
    });
    wrap.append(m);
  }
  return wrap;
};

// ── Eltern view ────────────────────────────────────────────────────────────
const renderEltern = () => {
  const wrap=h("div",{className:"app"});

  if(S.view==="home"){
    const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}});
    hdr.append(monthNav(true),on(h("button",{className:"btn",style:{width:"auto",padding:"6px 14px",fontSize:"13px",color:"#6e6e73"}},["🔒 Abmelden"]),"click",()=>{S.pin="";S.pinError=false;S.settingPin=false;navigate("/","pin",{activeKindId:null});}));
    wrap.append(hdr,statusBar());
    (S.data.children||[]).forEach((c,i)=>{
      const col=COLS[i%COLS.length],s=calcStats(c,S.month);
      const pct=s.vereinbart>0?Math.min(100,((s.elternGesamt+s.carryOver)/s.vereinbart)*100):0;
      const card=on(h("div",{className:"card",style:{cursor:"pointer"}}),"click",()=>{S.selId=c.id;S.view="child";render();});
      const info=h("div",{style:{flex:"1"}});
      info.append(h("p",{style:{fontWeight:"600",fontSize:"15px"}},[c.name]),h("p",{style:{fontSize:"12px",color:"#6e6e73"}},[fmt(s.vereinbart)+"/Monat · ausgegeben "+fmt(s.ausgaben)]));
      const right=h("div",{style:{textAlign:"right"}});
      right.append(h("p",{style:{fontSize:"11px",color:"#6e6e73"}},["noch offen"]),h("p",{style:{fontSize:"17px",fontWeight:"600",color:s.netOffen<0?"#833b0a":s.offen>0?col.text:"#aaa"}},[s.netOffen<0?`−${fmt(-s.netOffen)}`:fmt(s.offen)]));
      card.append(h("div",{className:"card-header"},[h("div",{className:"avatar",style:{background:col.bg,color:col.text}},[inits(c.name)]),info,right]));
      const bw=h("div",{style:{padding:"0 18px 6px"}});
      bw.append(h("div",{className:"bar-wrap"},[h("div",{className:"bar",style:{width:pct+"%",background:s.netOffen<0?"#ef9f27":col.bar}})]));
      card.append(bw);
      const foot=h("div",{style:{display:"flex",justifyContent:"space-between",padding:"4px 18px 12px",fontSize:"11px",color:"#6e6e73"}});
      foot.append(h("span",{},["Bargeld "+fmt(s.ausgezahlt)]),h("span",{},["Auslagen "+fmt(s.auslagen)]));
      if(s.carryOver>0) foot.append(h("span",{style:{color:"#833b0a"}},["Übertrag −"+fmt(s.carryOver)]));
      card.append(foot);
      wrap.append(card);
    });
    wrap.append(on(h("button",{className:"btn"},["+ Kind hinzufügen"]),"click",()=>{S.view="add-child";render();}));
  }

  else if(S.view==="add-child"){
    wrap.append(h("h2",{},["Kind hinzufügen"]));
    const nI=h("input",{type:"text",placeholder:"z. B. Luisa"});
    const mI=h("input",{type:"text",placeholder:"z. B. 20,00"});
    wrap.append(h("div",{className:"field"},[h("label",{},["Name"]),nI]),h("div",{className:"field",style:{marginBottom:"20px"}},[h("label",{},["Taschengeld / Monat (€)"]),mI]));
    const row=h("div",{className:"flex"});
    row.append(
      on(h("button",{className:"btn",style:{color:"#6e6e73"}},["Abbrechen"]),"click",()=>{S.view="home";render();}),
      on(h("button",{className:"btn",style:{fontWeight:"600"}},["Speichern"]),"click",()=>{
        if(!nI.value.trim()) return;
        const next={...S.data,children:[...S.data.children,{id:Date.now().toString(),name:nI.value.trim(),monatlBetrag:parseFloat(mI.value.replace(",","."))||0,transaktionen:[],sparziele:[]}]};
        S.view="home"; saveData(next);
      })
    );
    wrap.append(row);
  }

  else if(S.view==="child"){
    const c=S.data.children.find(x=>x.id===S.selId);
    if(!c){S.view="home";render();return wrap;}
    const col=COLS[S.data.children.indexOf(c)%COLS.length], s=calcStats(c,S.month);
    const pct=s.vereinbart>0?Math.min(100,((s.elternGesamt+s.carryOver)/s.vereinbart)*100):0;
    const topBar=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"1rem"}});
    const mn=monthNav(); mn.style.flex="1"; mn.style.justifyContent="center"; mn.style.display="flex";
    topBar.append(on(h("button",{className:"btn-ghost"},["←"]),"click",()=>{S.view="home";render();}),mn,h("div",{style:{width:"24px"}}));
    wrap.append(topBar,statusBar());

    const g1=h("div",{className:"grid2"});
    const vBox=on(h("div",{className:"stat-box",style:{cursor:"pointer"}},[h("div",{className:"stat-label"},["Vereinbart ✎"]),h("div",{className:"stat-val"},[fmt(s.vereinbart)])]),"click",()=>{S.editMonatl=String(c.monatlBetrag||"");S.modal="edit-monatl";render();});
    g1.append(vBox,h("div",{className:"stat-box"},[h("div",{className:"stat-label"},["Bargeld"]),h("div",{className:"stat-val"},[fmt(s.ausgezahlt)])]));
    const g2=h("div",{className:"grid2",style:{marginTop:"8px"}});
    g2.append(h("div",{className:"stat-box"},[h("div",{className:"stat-label"},["Auslagen"]),h("div",{className:"stat-val"},[fmt(s.auslagen)])]),h("div",{className:"stat-box"},[h("div",{className:"stat-label"},["Kind ausgegeben"]),h("div",{className:"stat-val",style:{color:"#d4537e"}},[fmt(s.ausgaben)])]));
    wrap.append(g1,g2);
    if(s.carryOver>0) wrap.append(h("div",{className:"carry-box",style:{marginTop:"10px"}},[h("span",{},["Übertrag aus Vormonat"]),h("span",{style:{fontWeight:"600"}},["−"+fmt(s.carryOver)])]));

    const prog=h("div",{className:"card",style:{padding:"12px 14px",marginTop:"10px",marginBottom:"1rem"}});
    const pRow=h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"8px"}});
    pRow.append(h("span",{style:{color:"#6e6e73"}},["Verrechnet "+fmt(s.elternGesamt)]));
    if(s.netOffen>=0) pRow.append(h("span",{style:{fontWeight:"600",color:s.offen>0?col.text:"#aaa"}},["Noch offen: "+fmt(s.offen)]));
    else pRow.append(h("span",{style:{fontWeight:"600",color:"#833b0a"}},["Schulden: "+fmt(-s.netOffen)+" → Folgemonat"]));
    prog.append(pRow,h("div",{className:"bar-wrap"},[h("div",{className:"bar",style:{width:pct+"%",background:s.netOffen<0?"#ef9f27":col.bar}})]));
    wrap.append(prog);

    const btnRow=h("div",{className:"grid2",style:{marginBottom:"1.5rem"}});
    btnRow.append(
      on(h("button",{className:"btn"},["Bargeld ausgezahlt"]),"click",()=>{S.form={betrag:"",notiz:"",typ:"taschengeld",datum:""};S.modal="buchen";render();}),
      on(h("button",{className:"btn"},["Auslage verbuchen"]),"click",()=>{S.form={betrag:"",notiz:"",typ:"auslage",datum:""};S.modal="buchen";render();})
    );
    wrap.append(btnRow);

    wrap.append(h("p",{style:{fontSize:"13px",color:"#6e6e73",fontWeight:"600",marginBottom:"8px"}},["Transaktionen "+mLabel(S.month)]));
    if(!s.txs.length) wrap.append(h("p",{style:{fontSize:"13px",color:"#6e6e73"}},["Noch keine Einträge."]));
    const LABELS={taschengeld:"Bargeld",auslage:"Auslage",ausgabe:"Kind"};
    const BGS={taschengeld:"#e1f5ee",auslage:"#faeeda",ausgabe:"#fbeaf0"};
    const TC={taschengeld:"#04342c",auslage:"#412402",ausgabe:"#4b1528"};
    const txList=h("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}});
    s.txs.forEach(tx=>{
      const row=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",background:"#fff",borderRadius:"10px",border:"1px solid #e5e5ea"}});
      const inf=h("div",{style:{flex:"1",minWidth:"0"}});
      inf.append(h("p",{style:{fontSize:"13px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},[tx.notiz||"–"]),h("p",{style:{fontSize:"11px",color:"#6e6e73"}},[fmtD(tx.datum)]));
      row.append(h("span",{className:"tag",style:{background:BGS[tx.typ]||"#eee",color:TC[tx.typ]||"#333"}},[LABELS[tx.typ]||tx.typ]),inf,h("span",{style:{fontSize:"13px",fontWeight:"600",flexShrink:"0"}},[fmt(tx.betrag)]));
      if(tx.typ!=="ausgabe") row.append(on(h("button",{className:"btn-ghost",style:{fontSize:"16px",padding:"0 2px"}},["×"]),"click",()=>{
        saveData({...S.data,children:S.data.children.map(ch=>ch.id===S.selId?{...ch,transaktionen:ch.transaktionen.filter(t=>t.id!==tx.id)}:ch)});
      }));
      txList.append(row);
    });
    wrap.append(txList);

    // QR-Code
    const kindUrl=window.location.origin+window.location.pathname+"?kind="+c.id;
    const qrSec=h("div",{className:"card",style:{padding:"16px 18px",marginTop:"16px",marginBottom:"8px"}});
    qrSec.append(h("p",{style:{fontSize:"13px",color:"#6e6e73",fontWeight:"600",marginBottom:"12px"}},["Kind-Link teilen"]));
    const qrDiv=h("div",{style:{display:"flex",justifyContent:"center",marginBottom:"12px"}});
    qrSec.append(qrDiv);
    const urlRow=h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}});
    const copyBtn=on(h("button",{className:"btn",style:{width:"auto",padding:"6px 12px",fontSize:"12px",flexShrink:"0"}},["📋 Kopieren"]),"click",()=>{
      navigator.clipboard.writeText(kindUrl).then(()=>{
        copyBtn.textContent="✓ Kopiert!";
        setTimeout(()=>{copyBtn.textContent="📋 Kopieren";},2000);
      });
    });
    urlRow.append(h("p",{style:{fontSize:"11px",color:"#6e6e73",flex:"1",wordBreak:"break-all"}},[kindUrl]),copyBtn);
    qrSec.append(urlRow);
    wrap.append(qrSec);
    setTimeout(()=>{if(typeof QRCode!=="undefined")new QRCode(qrDiv,{text:kindUrl,width:180,height:180,colorDark:"#1d1d1f",colorLight:"#ffffff"});},0);

    if(S.modal==="buchen"){
      const m=buildModal(S.form.typ==="taschengeld"?"Bargeld ausgezahlt":"Auslage verbuchen",()=>{S.modal=null;render();});
      addField(m,"Betrag (€)","text","0,00","form","betrag");
      addField(m,"Wofür?","text",S.form.typ==="auslage"?"z. B. Turnschuhe …":"z. B. Taschengeld Mai","form","notiz");
      if(S.form.typ==="auslage") addField(m,"Datum der Auslage","date","","form","datum");
      addModalBtns(m,()=>{S.modal=null;render();},()=>{
        const betrag=parseFloat(S.form.betrag.replace(",","."));
        if(!betrag||betrag<=0) return;
        const txDatum=S.form.datum?new Date(S.form.datum).toISOString():new Date().toISOString();
        const tx={id:Date.now().toString(),typ:S.form.typ,betrag,notiz:S.form.notiz.trim(),datum:txDatum,monatKey:S.form.datum?S.form.datum.slice(0,7):S.month};
        S.modal=null;
        saveData({...S.data,children:S.data.children.map(ch=>ch.id===S.selId?{...ch,transaktionen:[tx,...(ch.transaktionen||[])]}:ch)});
      });
      wrap.append(m);
    }
    if(S.modal==="edit-monatl"){
      const m=buildModal("Vereinbartes Taschengeld",()=>{S.modal=null;render();});
      addField(m,"Betrag pro Monat (€)","text","z. B. 25,00","editMonatl",null);
      addModalBtns(m,()=>{S.modal=null;render();},()=>{
        const v=parseFloat(S.editMonatl.replace(",","."));
        if(isNaN(v)||v<0) return;
        S.modal=null;
        saveData({...S.data,children:S.data.children.map(ch=>ch.id===S.selId?{...ch,monatlBetrag:v}:ch)});
      });
      wrap.append(m);
    }
  }
  return wrap;
};

// ── Main render ────────────────────────────────────────────────────────────
const render = () => {
  const root=document.getElementById("root");
  root.innerHTML="";
  if(S.loading){ root.append(h("div",{className:"loading"},["Lade Daten…"])); return; }
  if(S.mode==="pin"){ root.append(renderPin()); return; }
  if(S.mode==="kind"&&!S.kindPinOk){ root.append(renderKindPin()); return; }
  if(S.mode==="eltern") root.append(renderEltern());
  else if(S.mode==="kind") root.append(renderKind());
};

// ── Init ───────────────────────────────────────────────────────────────────
(async()=>{
  initRoute();
  render();
  try { S.data=await fbLoad(); } catch(e){ console.error(e); }
  S.loading=false; render();
})();
</script>
</body>
</html>
